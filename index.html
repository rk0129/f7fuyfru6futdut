<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ren Book</title>

  <!-- Swiper CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
    }

    .swiper {
      width: 100%;
      height: 100%;
    }

    .swiper-slide {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .swiper-slide img {
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    audio {
      display: none;
    }
  </style>
</head>

<body>

  <!-- Swiper本体 -->
  <div class="swiper">
    <div class="swiper-wrapper">

      <!-- 1ページ目 -->
      <div class="swiper-slide">
        <img src="img/page1.jpg">
        <audio src="audio/page1.mp3"></audio>
      </div>

      <!-- 2ページ目 -->
      <div class="swiper-slide">
        <img src="img/page2.jpg">
        <audio src="audio/page1.mp3"></audio>
      </div>

      <!-- 3ページ目 -->
      <div class="swiper-slide">
        <img src="img/page3.jpg">
        <audio src="audio/page1.mp3"></audio>
      </div>

    </div>
  </div>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    /* Service Worker */
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }

    /* ページめくり音 */
    const flipForward = new Audio("audio/flip-forward.mp3");
    const flipBack = new Audio("audio/flip-back.mp3");

    /* ページ内の音楽 */
    const audios = document.querySelectorAll("audio");

    /* 最初のタップで自動再生を許可 */
    let userInteracted = false;
    document.body.addEventListener("click", () => {
      userInteracted = true;

      // 初期ページの音を鳴らす
      const firstAudio = audios[0];
      if (firstAudio) {
        firstAudio.currentTime = 0;
        firstAudio.play();
      }
    }, { once: true });

    /* Swiper設定 */
    const swiper = new Swiper(".swiper", {
      allowTouchMove: true,
      navigation: false,
      on: {
        init() {
          // 初期ページの音（タップ済みなら鳴らす）
          if (userInteracted) {
            const firstAudio = audios[0];
            if (firstAudio) firstAudio.play();
          }
